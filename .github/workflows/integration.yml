name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  alfredv-tests:
    name: AlfredV Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install AlfredV deps
        run: cd alfredv && uv sync

      - name: Run AlfredV tests
        run: cd alfredv && uv run python -m pytest tests/ -v

